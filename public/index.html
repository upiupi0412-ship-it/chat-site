<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <title>Chat</title>

    <style>

        body {
            margin: 0;
            font-family: sans-serif;
            background: #f5f5f5;
        }

        /* 入室画面 */

        #home {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

            #home input {
                width: 320px;
                padding: 15px;
                font-size: 18px;
                border-radius: 8px;
                border: 1px solid #ccc;
            }

            #home button {
                width: 320px;
                padding: 16px;
                font-size: 20px;
                border: none;
                border-radius: 8px;
                background: #4CAF50;
                color: white;
                cursor: pointer;
            }

        /* チャット画面 */

        #chat {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            transform: translateX(100%);
            transition: 0.4s;
            display: flex;
            flex-direction: column;
        }

            #chat.open {
                transform: translateX(0);
            }

        /* 上部バー */

        #topbar {
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }

        #roomTitle {
            margin: 0;
            font-size: 20px;
        }

        /* 参加者 */

        #users {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .user {
            background: #eee;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
        }

        /* メッセージエリア */

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        /* メッセージ */

        .message {
            padding: 10px 14px;
            margin: 5px;
            max-width: 60%;
            border-radius: 15px;
            font-size: 16px;
        }

        .mine {
            background: #9fe8a9;
            margin-left: auto;
        }

        .other {
            background: #eee;
            margin-right: auto;
        }

        /* 入力エリア */

        #inputArea {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        #sendButton {
            padding: 14px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- 入室画面 -->

    <div id="home">

        <input id="name" placeholder="名前">
        <input id="room" placeholder="部屋名">

        <button onclick="joinRoom()">入る</button>

    </div>

    <!-- チャット画面 -->

    <div id="chat">

        <div id="topbar">
            <h2 id="roomTitle"></h2>
            <div id="users"></div>
        </div>

        <div id="messages"></div>

        <div id="inputArea">
            <input id="messageInput" placeholder="メッセージ">
            <button id="sendButton" onclick="sendMessage()">送信</button>
        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>

        const socket = io()

        function joinRoom(){

        const name=document.getElementById("name").value
        const room=document.getElementById("room").value

        if(!name || !room) return

        socket.emit("joinRoom",{
        roomName:room,
        userName:name
        })

        document.getElementById("roomTitle").textContent=room

        document.getElementById("chat").classList.add("open")

        }

        /* メッセージ送信 */

        function sendMessage(){

        const input=document.getElementById("messageInput")
        const text=input.value

        if(text==="") return

        socket.emit("chatMessage",text)

        input.value=""

        }

        /* 参加者更新 */

        socket.on("userList",(users)=>{

        const usersDiv=document.getElementById("users")

        usersDiv.innerHTML=""

        users.forEach(user=>{

        const div=document.createElement("div")
        div.classList.add("user")
        div.textContent=user

        usersDiv.appendChild(div)

        })

        })

        /* メッセージ受信 */

        socket.on("chatMessage",(data)=>{

        const messages=document.getElementById("messages")

        const div=document.createElement("div")

        div.classList.add("message")

        if(data.user===document.getElementById("name").value){
        div.classList.add("mine")
        }else{
        div.classList.add("other")
        }

        div.textContent=data.user+" : "+data.text

        messages.appendChild(div)

        messages.scrollTop=messages.scrollHeight

        })

    </script>

</body>
</html>
