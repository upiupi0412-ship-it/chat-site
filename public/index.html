<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <title>Chat Web</title>

    <style>

        body {
            margin: 0;
            font-family: sans-serif;
            background: #f5f5f5;
            overflow-x: hidden;
        }

        #home {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        #title {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #home input {
            width: 320px;
            padding: 15px;
            font-size: 18px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        #home button {
            width: 320px;
            padding: 16px;
            font-size: 20px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

        #chat {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            transform: translateX(100%);
            transition: 0.4s;
            display: flex;
            flex-direction: column;
        }

            #chat.open {
                transform: translateX(0);
            }

        #topbar {
            padding: 15px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        #roomInfo {
            display: flex;
            flex-direction: column;
        }

        #roomTitle {
            margin: 0;
            font-size: 20px;
        }

        #users {
            display: flex;
            gap: 10px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .user {
            background: #eee;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 14px;
        }

        #leaveButton {
            background: #ff4b4b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            height: 32px;
            margin-top: 2px;
        }

            #leaveButton:hover {
                background: #d32f2f;
            }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .msgContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            max-width: 60%;
            margin-bottom: 22px;
        }

        .mine {
            align-self: flex-end;
        }

        .other {
            align-self: flex-start;
        }

        .message {
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 16px;
            word-break: break-word;
            cursor: pointer;
        }

        .mine .message {
            background: #9fe8a9;
        }

        .other .message {
            background: #eee;
        }

        .msgHeader {
            font-size: 12px;
            color: #888;
            position: absolute;
            top: -16px;
            white-space: nowrap;
        }

        .mine .msgHeader {
            right: 10px;
            text-align: right;
        }

        .other .msgHeader {
            left: 10px;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        #sendButton {
            padding: 14px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

        .msgMenu {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: row;
            white-space: nowrap;
            gap: 8px;
            background: rgba(255,255,255,0.9);
            padding: 4px 8px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

            .msgMenu div {
                cursor: pointer;
                font-size: 13px;
                padding: 2px 6px;
                border-radius: 4px;
            }

                .msgMenu div:hover {
                    background: #eee;
                }
    </style>

</head>

<body>

    <div id="home">

        <div id="title">Chat Web</div>

        <input id="name" placeholder="名前">
        <input id="room" placeholder="部屋名">

        <button onclick="joinRoom()">入る</button>

    </div>

    <div id="chat">

        <div id="topbar">

            <div id="roomInfo">
                <h2 id="roomTitle"></h2>
                <div id="users"></div>
            </div>

            <button id="leaveButton" onclick="leaveRoom()">退出</button>

        </div>

        <div id="messages"></div>

        <div id="inputArea">

            <input id="messageInput" placeholder="メッセージ">
            <button id="sendButton" onclick="sendMessage()">送信</button>

        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>

        const socket=io()
        let currentMenu=null

        function joinRoom(){

        const name=document.getElementById("name").value
        const room=document.getElementById("room").value

        if(!name||!room)return

        socket.emit("joinRoom",{roomName:room,userName:name})

        document.getElementById("roomTitle").textContent=room
        document.getElementById("chat").classList.add("open")

        }

        function leaveRoom(){
        socket.disconnect()
        location.reload()
        }

        function sendMessage(){

        const input=document.getElementById("messageInput")
        const text=input.value

        if(text==="")return

        socket.emit("chatMessage",text)

        input.value=""
        }

        document.getElementById("messageInput").addEventListener("keydown",(e)=>{
        if(e.key==="Enter") sendMessage()
        })

        socket.on("chatMessage",(data)=>{

        const messages=document.getElementById("messages")

        const container=document.createElement("div")
        container.classList.add("msgContainer")

        const header=document.createElement("div")
        header.classList.add("msgHeader")

        const message=document.createElement("div")
        message.classList.add("message")

        header.textContent=data.user+" "+data.time
        message.textContent=data.text
        message.dataset.id=data.id

        const myName=document.getElementById("name").value

        if(data.user===myName){
        container.classList.add("mine")
        }else{
        container.classList.add("other")
        }

        message.onclick=(e)=>{
        e.stopPropagation()
        showMenu(message,data.text,data.id,data.user===myName)
        }

        container.appendChild(header)
        container.appendChild(message)

        messages.appendChild(container)
        messages.scrollTop=messages.scrollHeight

        })

        /* メッセージ削除 */

        socket.on("messageDeleted",(data)=>{

        const msg=document.querySelector('[data-id="'+data.id+'"]')
        if(!msg) return

        const container=msg.closest(".msgContainer")
        if(container) container.remove()

        })

        /* メッセージ編集 */

        socket.on("messageEdited",(data)=>{

        const msg=document.querySelector('[data-id="'+data.id+'"]')
        if(!msg) return

        msg.textContent=data.text

        const header=msg.previousElementSibling

        if(!header.textContent.includes("(編集済み)")){
        header.textContent+=" (編集済み)"
        }

        })

        function showMenu(messageElement,text,id,isMine){

        if(currentMenu) currentMenu.remove()

        const menu=document.createElement("div")
        menu.classList.add("msgMenu")
        menu.onclick=(e)=>e.stopPropagation()

        const copy=document.createElement("div")
        copy.textContent="コピー"
        copy.onclick=()=>{
        navigator.clipboard.writeText(text)
        menu.remove()
        }

        menu.appendChild(copy)

        if(isMine){

        const edit=document.createElement("div")
        edit.textContent="編集"

        edit.onclick=()=>{

        const newText=prompt("メッセージを編集",text)

        if(newText && newText!==text){

        socket.emit("editMessage",{
        id:id,
        text:newText
        })

        }

        menu.remove()

        }

        menu.appendChild(edit)

        const del=document.createElement("div")
        del.textContent="削除"

        del.onclick=()=>{
        socket.emit("deleteMessage",id)
        menu.remove()
        }

        menu.appendChild(del)

        }

        messageElement.appendChild(menu)
        currentMenu=menu

        }

        document.addEventListener("click",()=>{
        if(currentMenu){
        currentMenu.remove()
        currentMenu=null
        }
        })

    </script>

</body>
</html>
