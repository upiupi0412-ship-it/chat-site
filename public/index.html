<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">
    <title>Chat</title>

    <style>

        html, body {
            margin: 0;
            height: 100%;
            font-family: sans-serif;
            overflow-x: hidden;
            background: #f5f5f5;
        }

        /* メッセージ */

        .msgWrapper {
            position: relative;
            max-width: 60%;
            margin-bottom: 22px;
            display: inline-block;
        }

        .message {
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 16px;
            cursor: pointer;
        }

        .mine {
            align-self: flex-end;
        }

            .mine .message {
                background: #9fe8a9;
            }

        .other .message {
            background: #eee;
        }

        /* メニュー */

        .msgMenu {
            position: absolute;
            background: white;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            z-index: 1000;
        }

            .msgMenu div {
                padding: 8px 12px;
                cursor: pointer;
            }

                .msgMenu div:hover {
                    background: #eee;
                }

        .deleted {
            font-style: italic;
            color: #777;
            background: #ddd !important;
        }
    </style>

</head>

<body>

    <div id="messages"></div>

    <script src="/socket.io/socket.io.js"></script>

    <script>

        const socket=io()

        const name=prompt("名前")

        socket.emit("joinRoom",{roomName:"main",userName:name})

        let currentMenu=null

        function showMenu(x,y,msg,id,isMine){

        if(currentMenu)currentMenu.remove()

        const menu=document.createElement("div")
        menu.classList.add("msgMenu")

        const copy=document.createElement("div")
        copy.textContent="コピー"

        copy.onclick=()=>{
        navigator.clipboard.writeText(msg)
        menu.remove()
        }

        menu.appendChild(copy)

        if(isMine){

        const del=document.createElement("div")
        del.textContent="削除"

        del.onclick=()=>{
        socket.emit("deleteMessage",id)
        menu.remove()
        }

        menu.appendChild(del)

        }

        menu.style.left=x+"px"
        menu.style.top=y+"px"

        document.body.appendChild(menu)

        currentMenu=menu

        }

        document.addEventListener("click",()=>{
        if(currentMenu)currentMenu.remove()
        })

        socket.on("chatMessage",(data)=>{

        const messages=document.getElementById("messages")

        const wrap=document.createElement("div")
        wrap.classList.add("msgWrapper")

        if(data.user===name){
        wrap.classList.add("mine")
        }else{
        wrap.classList.add("other")
        }

        const msg=document.createElement("div")
        msg.classList.add("message")
        msg.textContent=data.text
        msg.dataset.id=data.id

        if(data.deleted){
        msg.classList.add("deleted")
        }

        msg.onclick=(e)=>{

        showMenu(
        e.pageX,
        e.pageY,
        data.text,
        data.id,
        data.user===name
        )

        }

        wrap.appendChild(msg)

        messages.appendChild(wrap)

        })

        socket.on("messageDeleted",(data)=>{

        const msg=document.querySelector(
        '[data-id="'+data.id+'"]'
        )

        if(!msg)return

        msg.textContent=data.text
        msg.classList.add("deleted")

        })

    </script>

</body>
</html>
