<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Chat Web</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#ffffff;
}

/* ===== 初期画面 ===== */
#start{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

input{
    padding:10px;
    margin:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

/* ===== チャット ===== */
#chat{
    display:none;
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* 上バー */
#topBar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    border-bottom:1px solid #ddd;
    background:#fff;
}

#topLeft{
    display:flex;
    flex-direction:column;
}

#topRight{
    display:flex;
    gap:10px;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

#sendButton{
    background:#2196f3;
    color:white;
}

#leaveButton{
    background:#f44336;
    color:white;
}

/* メッセージ */
#messages{
    flex:1;
    overflow-y:auto;
    padding:10px;
    background:#fafafa;
}

.msgContainer{
    margin:15px 0;
    display:flex;
}

.mine{
    justify-content:flex-end;
}

.other{
    justify-content:flex-start;
}

.message{
    max-width:60%;
    padding:10px;
    border-radius:8px;
    background:#e3f2fd;
    position:relative;
}

.other .message{
    background:#fff;
    border:1px solid #ddd;
}

/* 名前と時間 */
.msgHeader{
    font-size:11px;
    color:#888;
    margin-bottom:3px;
}

/* 入力欄 */
#inputArea{
    display:flex;
    padding:10px;
    border-top:1px solid #ddd;
    background:#fff;
}

#messageInput{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

/* メニュー */
.menu{
    position:absolute;
    bottom:-30px;
    right:0;
    display:flex;
    gap:10px;
    background:white;
    padding:5px 10px;
    border-radius:5px;
    border:1px solid #ccc;
}

.menu span{
    cursor:pointer;
}
</style>
</head>

<body>

<!-- 初期画面 -->
<div id="start">
    <h1>Chat Web</h1>
    <input id="name" placeholder="名前">
    <input id="room" placeholder="部屋名">
    <button onclick="join()">入る</button>
</div>

<!-- チャット -->
<div id="chat">

    <div id="topBar">
        <div id="topLeft">
            <div id="roomName"></div>
            <div id="userList"></div>
        </div>

        <div id="topRight">
            <button id="leaveButton" onclick="leaveRoom()">退出</button>
        </div>
    </div>

    <div id="messages"></div>

    <div id="inputArea">
        <input id="messageInput">
        <button id="sendButton" onclick="sendMessage()">投稿</button>
    </div>

</div>

<script>
const socket = io()

let myName=""
let currentMenu=null
let typingMsg=null
let typingTimer=null
let typingInterval=null

function join(){
    myName=document.getElementById("name").value
    const room=document.getElementById("room").value

    if(!myName||!room) return

    socket.emit("joinRoom",{userName:myName,roomName:room})

    document.getElementById("start").style.display="none"
    document.getElementById("chat").style.display="flex"

    document.getElementById("roomName").textContent=room
}

/* メッセージ */
function sendMessage(){
    const input=document.getElementById("messageInput")
    const text=input.value
    if(!text) return

    socket.emit("chatMessage",text)
    input.value=""

    socket.emit("stopTyping")
    removeTyping()
}

socket.on("chatMessage",(msg)=>{
    removeTyping()
    addMessage(msg)
})

function addMessage(msg){
    const container=document.createElement("div")
    container.classList.add("msgContainer")
    container.dataset.id=msg.id

    container.classList.add(msg.user===myName?"mine":"other")

    const message=document.createElement("div")
    message.classList.add("message")

    const header=document.createElement("div")
    header.classList.add("msgHeader")
    header.textContent=msg.user+" "+msg.time

    message.appendChild(header)
    message.appendChild(document.createTextNode(msg.text))

    message.onclick=(e)=>{
        e.stopPropagation()
        openMenu(message,msg)
    }

    container.appendChild(message)
    document.getElementById("messages").appendChild(container)
}

/* メニュー */
function openMenu(el,msg){
    closeMenu()

    const menu=document.createElement("div")
    menu.classList.add("menu")

    const copy=document.createElement("span")
    copy.textContent="コピー"
    copy.onclick=()=>navigator.clipboard.writeText(msg.text)

    menu.appendChild(copy)

    if(msg.user===myName){
        const del=document.createElement("span")
        del.textContent="削除"
        del.onclick=()=>socket.emit("deleteMessage",msg.id)
        menu.appendChild(del)
    }

    el.appendChild(menu)
    currentMenu=menu
}

function closeMenu(){
    if(currentMenu){
        currentMenu.remove()
        currentMenu=null
    }
}

document.body.onclick=closeMenu

socket.on("messageDeleted",(data)=>{
    document.querySelectorAll(".msgContainer").forEach(c=>{
        if(c.dataset.id===data.id) c.remove()
    })
})

/* typing */
document.getElementById("messageInput").addEventListener("input",()=>{
    showTyping(true)
    socket.emit("typing")

    clearTimeout(typingTimer)
    typingTimer=setTimeout(()=>{
        socket.emit("stopTyping")
        removeTyping()
    },1200)
})

socket.on("typing",()=>showTyping(false))
socket.on("stopTyping",()=>removeTyping())

function showTyping(isMine){
    if(typingMsg) return

    const container=document.createElement("div")
    container.classList.add("msgContainer")
    container.classList.add(isMine?"mine":"other")

    const msg=document.createElement("div")
    msg.classList.add("message")

    container.appendChild(msg)
    document.getElementById("messages").appendChild(container)

    typingMsg=msg

    let dots=0
    typingInterval=setInterval(()=>{
        if(!typingMsg) return
        dots=(dots+1)%4
        typingMsg.textContent=".".repeat(dots)
    },500)
}

function removeTyping(){
    if(typingMsg){
        typingMsg.parentElement.remove()
        typingMsg=null
    }
    if(typingInterval){
        clearInterval(typingInterval)
        typingInterval=null
    }
}

/* 退出 */
function leaveRoom(){
    location.reload()
}

socket.on("userList",(list)=>{
    document.getElementById("userList").textContent=list.join(", ")
})
</script>

</body>
</html>
