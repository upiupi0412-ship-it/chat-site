<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="robots" content="noindex">
<title>Chat Web</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
overflow-x:hidden;
}

#home{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:20px;
}

#title{
font-size:42px;
font-weight:bold;
}

#home input{
width:320px;
padding:15px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
}

#home button{
width:320px;
padding:16px;
font-size:20px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
}

#chat{
position:absolute;
width:100%;
height:100%;
background:white;
transform:translateX(100%);
transition:0.4s;
display:flex;
flex-direction:column;
}

#chat.open{
transform:translateX(0);
}

#topbar{
padding:15px;
border-bottom:1px solid #ddd;
display:flex;
justify-content:space-between;
align-items:center;
}

#roomTitle{
margin:0;
font-size:20px;
}

#leaveButton{
background:#ff4b4b;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

#messages{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
}

.msgContainer{
position:relative;
display:flex;
flex-direction:column;
max-width:60%;
margin-bottom:22px;
}

.mine{
align-self:flex-end;
}

.other{
align-self:flex-start;
}

.message{
padding:10px 14px;
border-radius:15px;
font-size:16px;
word-break:break-word;
cursor:pointer;
}

.mine .message{
background:#9fe8a9;
}

.other .message{
background:#eee;
}

.msgHeader{
font-size:12px;
color:#888;
position:absolute;
top:-16px;
white-space:nowrap;
}

.mine .msgHeader{
right:10px;
}

.other .msgHeader{
left:10px;
}

#inputArea{
display:flex;
padding:10px;
border-top:1px solid #ddd;
gap:10px;
}

#messageInput{
flex:1;
padding:14px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

#sendButton{
padding:14px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
}

/* メニュー */

.msgMenu{
position:absolute;
right:5px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:row;
gap:8px;
background:rgba(255,255,255,0.9);
padding:4px 8px;
border-radius:8px;
box-shadow:0 1px 4px rgba(0,0,0,0.2);
}

.msgMenu div{
cursor:pointer;
font-size:13px;
padding:2px 6px;
border-radius:4px;
}

.msgMenu div:hover{
background:#eee;
}

</style>

</head>

<body>

<div id="home">

<div id="title">Chat Web</div>

<input id="name" placeholder="名前">
<input id="room" placeholder="部屋名">

<button onclick="joinRoom()">入る</button>

</div>

<div id="chat">

<div id="topbar">

<h2 id="roomTitle"></h2>

<button id="leaveButton" onclick="leaveRoom()">退出</button>

</div>

<div id="messages"></div>

<div id="inputArea">

<input id="messageInput" placeholder="メッセージ">
<button id="sendButton" onclick="sendMessage()">送信</button>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket=io()

let currentMenu=null
let typingMsg=null
let typingTimer=null
let roomName=""

/* 入室 */

function joinRoom(){

const name=document.getElementById("name").value
roomName=document.getElementById("room").value

if(!name||!roomName)return

socket.emit("joinRoom",{roomName:roomName,userName:name})

document.getElementById("roomTitle").textContent=roomName
document.getElementById("chat").classList.add("open")

}

/* 退出 */

function leaveRoom(){
socket.disconnect()
location.reload()
}

/* 送信 */

function sendMessage(){

const input=document.getElementById("messageInput")
const text=input.value

if(text==="")return

socket.emit("chatMessage",text)

input.value=""

socket.emit("stopTyping")

removeTyping()

}

/* Enter送信 */

document.getElementById("messageInput").addEventListener("keydown",(e)=>{

if(e.key==="Enter") sendMessage()

})

/* typing送信 */

document.getElementById("messageInput").addEventListener("input",()=>{

socket.emit("typing")

clearTimeout(typingTimer)

typingTimer=setTimeout(()=>{

socket.emit("stopTyping")

},1500)

})

/* メッセージ受信 */

socket.on("chatMessage",(data)=>{

removeTyping()

const messages=document.getElementById("messages")

const container=document.createElement("div")
container.classList.add("msgContainer")

const header=document.createElement("div")
header.classList.add("msgHeader")

const message=document.createElement("div")
message.classList.add("message")

header.textContent=data.user+" "+data.time
message.textContent=data.text
message.dataset.id=data.id

const myName=document.getElementById("name").value

if(data.user===myName){
container.classList.add("mine")
}else{
container.classList.add("other")
}

message.onclick=(e)=>{
e.stopPropagation()
showMenu(message,data.text,data.id,data.user===myName)
}

container.appendChild(header)
container.appendChild(message)

messages.appendChild(container)

messages.scrollTop=messages.scrollHeight

})

/* 削除受信 */

socket.on("messageDeleted",(data)=>{

const msg=document.querySelector('[data-id="'+data.id+'"]')
if(!msg) return

const container=msg.closest(".msgContainer")
if(container) container.remove()

})

/* typing受信 */

socket.on("typing",()=>{

showTyping()

})

socket.on("stopTyping",()=>{

removeTyping()

})

/* typing表示 */

function showTyping(){

if(typingMsg) return

const messages=document.getElementById("messages")

const container=document.createElement("div")
container.classList.add("msgContainer","other")

const message=document.createElement("div")
message.classList.add("message")

container.appendChild(message)

messages.appendChild(container)

typingMsg=message

animateDots()

messages.scrollTop=messages.scrollHeight

}

/* typing削除 */

function removeTyping(){

if(!typingMsg) return

typingMsg.parentElement.remove()
typingMsg=null

}

/* ... animation */

function animateDots(){

let dots=1

const interval=setInterval(()=>{

if(!typingMsg){
clearInterval(interval)
return
}

typingMsg.textContent=".".repeat(dots)

dots++

if(dots>3)dots=1

},400)

}

/* メニュー */

function showMenu(messageElement,text,id,isMine){

if(currentMenu) currentMenu.remove()

const menu=document.createElement("div")
menu.classList.add("msgMenu")

menu.onclick=(e)=>e.stopPropagation()

const copy=document.createElement("div")
copy.textContent="コピー"

copy.onclick=()=>{
navigator.clipboard.writeText(text)
menu.remove()
}

menu.appendChild(copy)

if(isMine){

const del=document.createElement("div")
del.textContent="削除"

del.onclick=()=>{
socket.emit("deleteMessage",id)
menu.remove()
}

menu.appendChild(del)

}

messageElement.appendChild(menu)

currentMenu=menu

}

/* メニュー外クリック */

document.addEventListener("click",()=>{

if(currentMenu){
currentMenu.remove()
currentMenu=null
}

})

</script>

</body>
</html>
