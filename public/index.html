<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <title>Chat Web</title>

    <style>

        body {
            margin: 0;
            font-family: sans-serif;
            background: #f5f5f5;
            overflow-x: hidden;
        }

        #home {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        #title {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #home input {
            width: 320px;
            padding: 15px;
            font-size: 18px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        #home button {
            width: 320px;
            padding: 16px;
            font-size: 20px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

        #chat {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            transform: translateX(100%);
            transition: 0.4s;
            display: flex;
            flex-direction: column;
        }

            #chat.open {
                transform: translateX(0);
            }

        #topbar {
            padding: 15px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
        }

        #roomTitle {
            margin: 0;
            font-size: 20px;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .msgContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            max-width: 60%;
            margin-bottom: 22px;
        }

        .mine {
            align-self: flex-end;
        }

        .other {
            align-self: flex-start;
        }

        .message {
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 16px;
            word-break: break-word;
            cursor: pointer;
        }

        .mine .message {
            background: #9fe8a9;
        }

        .other .message {
            background: #eee;
        }

        .msgHeader {
            font-size: 12px;
            color: #888;
            position: absolute;
            top: -16px;
            white-space: nowrap;
        }

        .mine .msgHeader {
            right: 10px;
        }

        .other .msgHeader {
            left: 10px;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        #sendButton {
            padding: 14px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

        /* typing animation */

        .typing {
            font-style: italic;
            opacity: 0.7;
        }
    </style>

</head>

<body>

    <div id="home">

        <div id="title">Chat Web</div>

        <input id="name" placeholder="名前">
        <input id="room" placeholder="部屋名">

        <button onclick="joinRoom()">入る</button>

    </div>

    <div id="chat">

        <div id="topbar">

            <h2 id="roomTitle"></h2>

            <button onclick="leaveRoom()">退出</button>

        </div>

        <div id="messages"></div>

        <div id="inputArea">

            <input id="messageInput" placeholder="メッセージ">
            <button onclick="sendMessage()">送信</button>

        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>

        const socket=io()

        let typingElement=null
        let typingTimer=null
        let roomName=""

        /* 入室 */

        function joinRoom(){

        const name=document.getElementById("name").value
        roomName=document.getElementById("room").value

        if(!name||!roomName)return

        socket.emit("joinRoom",{roomName:roomName,userName:name})

        document.getElementById("roomTitle").textContent=roomName
        document.getElementById("chat").classList.add("open")

        }

        /* 退出 */

        function leaveRoom(){
        socket.disconnect()
        location.reload()
        }

        /* 送信 */

        function sendMessage(){

        const input=document.getElementById("messageInput")
        const text=input.value

        if(text==="")return

        socket.emit("chatMessage",text)

        input.value=""

        socket.emit("stopTyping",roomName)

        removeTyping()

        }

        /* Enter送信 */

        document.getElementById("messageInput").addEventListener("keydown",(e)=>{

        if(e.key==="Enter") sendMessage()

        })

        /* typing検知 */

        document.getElementById("messageInput").addEventListener("input",()=>{

        socket.emit("typing",roomName)

        clearTimeout(typingTimer)

        typingTimer=setTimeout(()=>{

        socket.emit("stopTyping",roomName)

        },1500)

        })

        /* メッセージ表示 */

        socket.on("chatMessage",(data)=>{

        removeTyping()

        const messages=document.getElementById("messages")

        const container=document.createElement("div")
        container.classList.add("msgContainer")

        const header=document.createElement("div")
        header.classList.add("msgHeader")

        const message=document.createElement("div")
        message.classList.add("message")

        header.textContent=data.user+" "+data.time
        message.textContent=data.text

        const myName=document.getElementById("name").value

        if(data.user===myName){
        container.classList.add("mine")
        }else{
        container.classList.add("other")
        }

        container.appendChild(header)
        container.appendChild(message)

        messages.appendChild(container)

        messages.scrollTop=messages.scrollHeight

        })

        /* typing受信 */

        socket.on("typing",(data)=>{

        showTyping(data.user)

        })

        socket.on("stopTyping",()=>{

        removeTyping()

        })

        /* typing表示 */

        function showTyping(user){

        removeTyping()

        const messages=document.getElementById("messages")

        const container=document.createElement("div")
        container.classList.add("msgContainer","other","typing")

        typingElement=container

        const message=document.createElement("div")
        message.classList.add("message")

        container.appendChild(message)

        messages.appendChild(container)

        animateDots(message)

        messages.scrollTop=messages.scrollHeight

        }

        /* typing削除 */

        function removeTyping(){

        if(typingElement){

        typingElement.remove()
        typingElement=null

        }

        }

        /* ... animation */

        function animateDots(el){

        let dots=1

        setInterval(()=>{

        if(!typingElement) return

        el.textContent=".".repeat(dots)

        dots++

        if(dots>3) dots=1

        },400)

        }

    </script>

</body>
</html>
